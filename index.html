<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reaction-Diffusion Explorer</title>
  <meta name="description" content="反応拡散モデルのパラメータ空間をマトリックス表示して、面白い模様が生まれる組み合わせを探すツール">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <script>
    // ちらつき防止: CSS 適用前に保存済みテーマを反映する
    try {
      var t = localStorage.getItem("rd-theme");
      if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  </script>
</head>
<body>
  <div class="page">
    <header class="header container-app">
      <div class="header__titles">
        <h1 class="header__title">Reaction-Diffusion Explorer</h1>
        <p class="header__subtitle">パラメータ空間を眺めて、面白い模様が生まれる組み合わせを探す</p>
      </div>
      <div class="segment" id="theme-segment" role="group" aria-label="テーマ"
           data-squircle data-squircle-radius="999" data-squircle-stroke>
        <span class="segment__thumb" data-squircle data-squircle-radius="999" aria-hidden="true"></span>
        <button type="button" class="segment__option" data-value="light">Light</button>
        <button type="button" class="segment__option segment__option--active" data-value="auto">Auto</button>
        <button type="button" class="segment__option" data-value="dark">Dark</button>
      </div>
    </header>

    <main class="main container-app">
      <div class="main__stage">
        <!-- マトリックスビュー -->
        <section class="view" id="view-matrix" aria-label="パラメータマトリックス">
          <div class="card view-card" data-squircle data-squircle-radius="12">
            <div class="matrix">
              <span class="matrix__axis matrix__axis--y" id="y-axis-label">縦軸</span>
              <div class="matrix__yticks" id="y-ticks" aria-hidden="true"></div>
              <div class="matrix__canvas-wrap" id="matrix-wrap">
                <canvas id="matrix-canvas" aria-label="反応拡散モデルのパラメータマトリックス"></canvas>
                <div class="matrix__hover" id="matrix-hover" hidden></div>
                <div class="matrix__tooltip" id="matrix-tooltip" hidden aria-hidden="true"></div>
              </div>
              <div class="matrix__xticks" id="x-ticks" aria-hidden="true"></div>
              <span class="matrix__axis matrix__axis--x" id="x-axis-label">横軸</span>
            </div>
            <p class="view-card__hint">タイルをクリックすると、そのパラメータで拡大表示します</p>
          </div>
        </section>

        <!-- 単体ビュー -->
        <section class="view" id="view-single" hidden aria-label="単体シミュレーション">
          <div class="card view-card" data-squircle data-squircle-radius="12">
            <div class="view-card__bar">
              <button type="button" id="back-button" class="button button--ghost"
                      data-squircle data-squircle-radius="8">← マトリックスへ戻る</button>
              <span class="view-card__params" id="single-params"></span>
            </div>
            <div class="single__canvas-wrap">
              <canvas id="single-canvas" aria-label="反応拡散モデルのシミュレーション"></canvas>
            </div>
            <p class="view-card__hint">キャンバスをドラッグすると化学種 V を描き足せます</p>
          </div>
        </section>

        <!-- WebGL2 が使えない場合 -->
        <section class="view" id="view-error" hidden>
          <div class="card view-card" data-squircle data-squircle-radius="12">
            <h2 class="error__title">シミュレーションを開始できませんでした</h2>
            <p class="error__body" id="error-message">このブラウザでは WebGL2 を利用できません。</p>
          </div>
        </section>
      </div>

      <!-- コントロール -->
      <aside class="card controls" data-squircle data-squircle-radius="12" aria-label="コントロール">
        <!-- パラメータ類はここだけが独立してスクロールする -->
        <div class="controls__scroll">
          <div class="control-group">
            <label class="control-label" for="model-select">モデル</label>
            <select id="model-select" class="input"></select>
            <div class="model-info" id="model-info"></div>
          </div>

          <div class="control-group" data-only="matrix">
            <span class="control-label">マトリックスの軸と分割数</span>
            <div class="axis-picker">
              <div class="axis-picker__row">
                <label class="axis-picker__tag" for="x-axis-select">横軸 X</label>
                <select id="x-axis-select" class="input input--sm"></select>
                <div class="segment segment--sm" id="x-grid-segment" role="group" aria-label="横軸の分割数"
                     data-squircle data-squircle-radius="999" data-squircle-stroke>
                  <span class="segment__thumb" data-squircle data-squircle-radius="999" aria-hidden="true"></span>
                  <button type="button" class="segment__option" data-value="6" aria-label="横 6 分割">6</button>
                  <button type="button" class="segment__option segment__option--active" data-value="8" aria-label="横 8 分割">8</button>
                  <button type="button" class="segment__option" data-value="10" aria-label="横 10 分割">10</button>
                </div>
              </div>
              <div class="axis-picker__row">
                <label class="axis-picker__tag" for="y-axis-select">縦軸 Y</label>
                <select id="y-axis-select" class="input input--sm"></select>
                <div class="segment segment--sm" id="y-grid-segment" role="group" aria-label="縦軸の分割数"
                     data-squircle data-squircle-radius="999" data-squircle-stroke>
                  <span class="segment__thumb" data-squircle data-squircle-radius="999" aria-hidden="true"></span>
                  <button type="button" class="segment__option" data-value="6" aria-label="縦 6 分割">6</button>
                  <button type="button" class="segment__option segment__option--active" data-value="8" aria-label="縦 8 分割">8</button>
                  <button type="button" class="segment__option" data-value="10" aria-label="縦 10 分割">10</button>
                </div>
              </div>
            </div>
          </div>

          <!-- パラメータコントロール (モデル / 軸選択 / ビューに応じて再生成) -->
          <div id="param-controls"></div>
        </div>

        <!-- 常に表示するパネルフッター (一時停止 / 再生速度 / 再シード) -->
        <div class="controls__footer">
          <button type="button" id="pause-button" class="button button--secondary button--icon" aria-pressed="false" aria-label="一時停止" title="一時停止"
                  data-squircle data-squircle-radius="8" data-squircle-stroke>
            <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <rect x="6.5" y="5" width="4" height="14" rx="1.2"/><rect x="13.5" y="5" width="4" height="14" rx="1.2"/>
            </svg>
            <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" hidden>
              <path d="M8 5.2 L19 12 L8 18.8 Z"/>
            </svg>
          </button>

          <div class="segment" id="speed-segment" role="group" aria-label="速度"
               data-squircle data-squircle-radius="999" data-squircle-stroke>
            <span class="segment__thumb" data-squircle data-squircle-radius="999" aria-hidden="true"></span>
            <button type="button" class="segment__option segment__option--icon" data-value="1" aria-label="速度 ×1" title="速度 ×1">
              <svg viewBox="0 0 9 12" fill="currentColor" aria-hidden="true">
                <path d="M0.5 0.8 L8.5 6 L0.5 11.2 Z"/>
              </svg>
            </button>
            <button type="button" class="segment__option segment__option--active segment__option--icon" data-value="2" aria-label="速度 ×2" title="速度 ×2">
              <svg viewBox="0 0 16 12" fill="currentColor" aria-hidden="true">
                <path d="M0.5 0.8 L8.5 6 L0.5 11.2 Z"/><path d="M7.5 0.8 L15.5 6 L7.5 11.2 Z"/>
              </svg>
            </button>
            <button type="button" class="segment__option segment__option--icon" data-value="4" aria-label="速度 ×4" title="速度 ×4">
              <svg viewBox="0 0 23 12" fill="currentColor" aria-hidden="true">
                <path d="M0.5 0.8 L8.5 6 L0.5 11.2 Z"/><path d="M7.5 0.8 L15.5 6 L7.5 11.2 Z"/><path d="M14.5 0.8 L22.5 6 L14.5 11.2 Z"/>
              </svg>
            </button>
          </div>

          <button type="button" id="reseed-button" class="button button--primary button--icon" aria-label="再シード" title="再シード"
                  data-squircle data-squircle-radius="8">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
            </svg>
          </button>
        </div>
      </aside>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
